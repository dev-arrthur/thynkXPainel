<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thynkXP | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm" style="max-width:420px;width:100%;">
    <div class="card-body p-4">
      <h2 class="mb-1"><span class="brand-thynk">thynk</span><span class="brand-xp">XP</span></h2>
      <p class="text-muted">Login administrativo</p>
      <div id="loginAlert" class="alert d-none"></div>
      <form id="loginForm" class="d-grid gap-3">
        <input type="email" class="form-control" id="email" placeholder="Email" required>
        <input type="password" class="form-control" id="password" placeholder="Senha" required minlength="6">
        <button class="btn btn-dark" type="submit">Entrar no dashboard</button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
