<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Documentação | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div><main class="content-area"><section class="glass-card p-4 reveal">
<h1 class="h3 mb-2"><i class="bi bi-journal-richtext me-2"></i>Dashboard de Contratos</h1>
<p class="text-secondary">Visão inteligente da documentação e desempenho de assinaturas.</p>
<div class="row g-3 mb-3"><div class="col-md-3"><div class="glass-card p-3"><small>Total de contratos</small><div class="kpi-value" id="kpiContractsTotal">0</div></div></div><div class="col-md-3"><div class="glass-card p-3"><small>Assinados</small><div class="kpi-value text-success" id="kpiContractsSigned">0</div></div></div><div class="col-md-3"><div class="glass-card p-3"><small>Pendentes</small><div class="kpi-value text-warning" id="kpiContractsPending">0</div></div></div><div class="col-md-3"><div class="glass-card p-3"><small>Tempo médio assinatura</small><div class="kpi-value" id="kpiAvgSignTime">0h</div></div></div></div>
<div class="row g-3"><div class="col-lg-7"><div class="glass-card p-3"><h6>Evolução de contratos criados e assinados</h6><canvas id="contractsTrendChart" height="120"></canvas></div></div><div class="col-lg-5"><div class="glass-card p-3"><h6>Contratos por tema</h6><canvas id="contractsThemeChart" height="120"></canvas></div></div></div>
</section></main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/contracts-dashboard.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(loadContractsDashboardStats);</script></body></html>
