<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clientes | Gerenciamento</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div><main class="content-area"><section class="row g-3"><div class="col-lg-5 reveal"><div class="glass-card p-4"><h1 class="h4 mb-3"><i class="bi bi-person-plus me-2"></i>Novo cliente</h1><div id="clientFeedback" class="alert d-none"></div><form id="clientForm" class="d-grid gap-2"><input id="clientName" class="form-control" placeholder="Nome" required><input id="clientEmail" type="email" class="form-control" placeholder="Email" required><input id="clientCompany" class="form-control" placeholder="Empresa" required><select id="clientStatus" class="form-select"><option>Ativo</option><option>Em negociação</option><option>Inativo</option></select><textarea id="clientNotes" class="form-control" rows="3" placeholder="Observações"></textarea><button class="btn btn-xp">Salvar cliente</button></form></div></div><div class="col-lg-7 reveal"><div class="glass-card p-4"><h2 class="h5 mb-3"><i class="bi bi-layout-text-sidebar-reverse me-2"></i>Lista de clientes</h2><div class="table-responsive"><table class="table table-modern"><thead><tr><th>Nome</th><th>Email</th><th>Empresa</th><th>Status</th></tr></thead><tbody id="clientsTableBody"></tbody></table></div></div></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/clients.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(async()=>{await loadClients();await bindClientForm();});</script></body></html>
