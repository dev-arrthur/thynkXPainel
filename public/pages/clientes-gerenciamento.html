<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clientes | Gerenciamento</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div><main class="content-area"><section class="glass-card p-4 reveal"><div class="d-flex justify-content-between align-items-center"><h1 class="h4 mb-0">Gerenciamento de Clientes</h1><button class="btn btn-xp" data-bs-toggle="offcanvas" data-bs-target="#clientPanel">Adicionar Cliente</button></div><hr><div id="clientFeedback" class="alert d-none"></div><div class="table-responsive"><table class="table table-modern"><thead><tr><th>CÓD</th><th>Nome</th><th>CNPJ/CPF</th><th>E-mail</th><th>Telefone</th><th>Cidade</th><th>Valor Contrato</th><th>Ações</th></tr></thead><tbody id="clientsTableBody"></tbody></table></div></section></main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="clientPanel" style="width:520px;"><div class="offcanvas-header"><h5>Novo Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><form id="clientForm" class="d-grid gap-2"><h6>Dados do Responsável</h6><input id="responsibleCpf" class="form-control" placeholder="CPF" required><div class="row g-2"><div class="col"><input id="responsibleName" class="form-control" placeholder="Nome" required></div><div class="col"><input id="responsibleSurname" class="form-control" placeholder="Sobrenome" required></div></div><input id="responsibleEmail" class="form-control" type="email" placeholder="E-mail" required><input id="responsiblePhone" class="form-control" placeholder="Telefone" required><hr><h6>Dados da Empresa</h6><input id="companyName" class="form-control" placeholder="Nome" required><input id="companyDocument" class="form-control" placeholder="CNPJ/CPF" required><input id="companyEmail" class="form-control" type="email" placeholder="E-mail" required><input id="companyPhone" class="form-control" placeholder="Telefone" required><input id="city" class="form-control" placeholder="Cidade" required><input id="contractValue" class="form-control" type="number" step="0.01" placeholder="Valor Contrato" required><hr><h6>Acesso</h6><input id="accessEmail" class="form-control" type="email" placeholder="E-mail" required><input id="accessPassword" class="form-control" type="password" placeholder="Senha" required><button class="btn btn-xp mt-2">Salvar Cliente</button></form></div></div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="editClientPanel" style="width:520px;"><div class="offcanvas-header"><h5>Editar Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><form id="editClientForm" class="d-grid gap-2"><input type="hidden" id="editClientId"><input id="editCompanyName" class="form-control" placeholder="Nome"><input id="editCompanyDocument" class="form-control" placeholder="CNPJ/CPF"><input id="editCompanyEmail" class="form-control" type="email" placeholder="E-mail"><input id="editCompanyPhone" class="form-control" placeholder="Telefone"><input id="editCity" class="form-control" placeholder="Cidade"><input id="editContractValue" class="form-control" type="number" step="0.01" placeholder="Valor Contrato"><button class="btn btn-xp">Atualizar Cliente</button></form></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/clients.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(loadClients);bindClientForm();bindEditClientForm();</script></body></html>
