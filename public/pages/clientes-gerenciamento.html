<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clientes | Gerenciamento</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/app.css"></head>
<body><div id="sidebarMount"></div><main class="content-area"><h1>Clientes - Gerenciamento</h1><p class="text-muted">Cadastrar e visualizar clientes.</p>
<div class="row g-4"><div class="col-lg-5"><div class="card"><div class="card-body"><div id="clientFeedback" class="alert d-none"></div><form id="clientForm" class="d-grid gap-2"><input id="clientName" class="form-control" placeholder="Nome" required><input id="clientEmail" type="email" class="form-control" placeholder="Email" required><input id="clientCompany" class="form-control" placeholder="Empresa" required><select id="clientStatus" class="form-select"><option>Ativo</option><option>Em negociação</option><option>Inativo</option></select><textarea id="clientNotes" class="form-control" placeholder="Observações"></textarea><button class="btn btn-dark">Salvar cliente</button></form></div></div></div><div class="col-lg-7"><div class="card"><div class="card-body"><table class="table"><thead><tr><th>Nome</th><th>Email</th><th>Empresa</th><th>Status</th></tr></thead><tbody id="clientsTableBody"></tbody></table></div></div></div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/clients.js"></script><script>protectPage();mountSidebar().then(async()=>{await loadClients();await bindClientForm();});</script></body></html>
