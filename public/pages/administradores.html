<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administradores</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-grid">
  <div id="sidebarMount"></div>

  <main class="content-area">
    <section class="glass-card p-4 reveal">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h3 mb-1"><i class="bi bi-person-gear me-2"></i>Administradores</h1>
          <p class="text-secondary mb-0">Controle de acessos administrativos.</p>
        </div>
        <button class="btn btn-xp" data-bs-toggle="offcanvas" data-bs-target="#addAdminPanel" aria-controls="addAdminPanel">
          <i class="bi bi-person-plus me-2"></i>Adicionar Administrador
        </button>
      </div>

      <div id="adminFeedback" class="alert d-none"></div>

      <div class="table-responsive">
        <table class="table table-modern">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Status de senha</th>
            </tr>
          </thead>
          <tbody id="adminsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="addAdminPanel" aria-labelledby="addAdminPanelLabel" style="width: 420px;">
    <div class="offcanvas-header">
      <h5 id="addAdminPanelLabel"><i class="bi bi-person-plus me-2"></i>Novo Administrador</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
    </div>
    <div class="offcanvas-body">
      <p class="text-muted small">Se a senha for <strong>123456</strong>, o administrador será obrigado a redefinir no primeiro acesso.</p>
      <div id="addAdminFeedback" class="alert d-none"></div>
      <form id="addAdminForm" class="d-grid gap-3">
        <div>
          <label class="form-label">Nome</label>
          <input class="form-control" id="adminName" required>
        </div>
        <div>
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" id="adminEmail" required>
        </div>
        <div>
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" id="adminPassword" minlength="6" required>
        </div>
        <button class="btn btn-xp" type="submit">Salvar administrador</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/admins.js"></script>
  <script>
    protectPage();
    mountSidebar().then(loadAdmins);
    bindAddAdminForm();
  </script>
</body>
</html>
