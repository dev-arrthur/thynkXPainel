<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Administradores</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div>
<main class="content-area"><section class="glass-card p-4 reveal">
<div class="d-flex justify-content-between align-items-center mb-3"><div><h1 class="h3 mb-1"><i class="bi bi-person-gear me-2"></i>Administradores</h1></div><button class="btn btn-xp" data-bs-toggle="offcanvas" data-bs-target="#addAdminPanel"><i class="bi bi-person-plus me-2"></i>Adicionar Administrador</button></div>
<hr><div id="adminFeedback" class="alert d-none"></div>
<div class="table-responsive"><table class="table table-modern"><thead><tr><th>Nome</th><th>E-mail</th><th>Senha</th><th>Ações</th></tr></thead><tbody id="adminsTableBody"></tbody></table></div>
</section></main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="addAdminPanel" style="width:420px;"><div class="offcanvas-header"><h5>Novo Administrador</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><div id="addAdminFeedback" class="alert d-none"></div><form id="addAdminForm" class="d-grid gap-2"><input id="adminName" class="form-control" placeholder="Nome" required><input id="adminEmail" class="form-control" type="email" placeholder="E-mail" required><input id="adminPassword" class="form-control" type="password" placeholder="Senha" required><button class="btn btn-xp">Salvar</button></form></div></div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="editAdminPanel" style="width:420px;"><div class="offcanvas-header"><h5>Editar Administrador</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><div id="editAdminFeedback" class="alert d-none"></div><form id="editAdminForm" class="d-grid gap-2"><input type="hidden" id="editAdminId"><input id="editAdminName" class="form-control" placeholder="Nome" required><input id="editAdminEmail" class="form-control" type="email" placeholder="E-mail" required><input id="editAdminPassword" class="form-control" type="password" placeholder="Nova senha (opcional)"><button class="btn btn-xp">Atualizar</button></form></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/ui.js"></script><script src="/js/admins.js"></script><script>protectPage();mountSidebar().then(loadAdmins);bindAddAdminForm();bindEditAdminForm();</script></body></html>
