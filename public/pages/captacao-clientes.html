<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Captação de Clientes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div><main class="content-area">
<section class="glass-card p-4 reveal"><div class="d-flex justify-content-between align-items-center"><h1 class="h4 mb-0">Gerenciamento de Captação</h1><button class="btn btn-xp" data-bs-toggle="offcanvas" data-bs-target="#capturePanel">Iniciar Captação</button></div><hr>
<div id="captureFeedback" class="alert d-none"></div>
<div class="row g-3"><div class="col-lg-5"><div class="glass-card p-3"><h6>Lista</h6><div class="table-responsive" style="max-height:380px;overflow:auto;"><table class="table table-modern"><thead><tr><th>Nome</th><th>Ações</th></tr></thead><tbody id="captureTableBody"></tbody></table></div></div></div>
<div class="col-lg-7"><div class="glass-card p-3 mb-3"><h6>Mapa de captações concluídas</h6><div id="captureHeatMap" style="height:280px;border-radius:12px;"></div><small class="text-muted">Vermelho (0-3), Amarelo (4-6), Verde (7-11), Azul (12-30)</small></div><div class="glass-card p-3"><h6>Empresas buscadas (linha)</h6><canvas id="captureTimelineChart" height="95"></canvas></div></div></div>
</section></main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="capturePanel" style="width:560px;"><div class="offcanvas-header"><h5>Nova Captação</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><form id="captureForm" class="d-grid gap-2"><hr><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="scheduledSwitch"><label class="form-check-label">Agendada?</label></div><div id="scheduledFields" class="d-none"><input type="datetime-local" id="scheduledAt" class="form-control"></div>
<input id="captureCategory" class="form-control" list="captureCategoryList" placeholder="Categoria"><datalist id="captureCategoryList"></datalist>
<input id="captureLocation" class="form-control" list="captureLocationList" placeholder="Localização"><datalist id="captureLocationList"></datalist>
<input id="captureRadius" type="number" class="form-control" min="500" max="30000" value="3000" placeholder="Raio (m)">
<div id="captureLocationMap" style="height:220px;border-radius:12px;"></div>
<hr><label>Coletar Informações?</label><div class="form-check"><input class="form-check-input" type="checkbox" id="collectInfo" checked><label class="form-check-label">Nome, E-mail, Telefone, Site, Redes Sociais, Endereço</label></div>
<hr><h6>Quantidade de Captações</h6><input id="captureQuantity" type="number" class="form-control" min="1" max="10" value="5" placeholder="Quantidade de buscas por vez (1 a 10)">
<button class="btn btn-xp mt-2">Fazer a Captação</button></form></div></div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="captureDetailsPanel" style="width:520px;"><div class="offcanvas-header"><h5>Dados da Captação</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body" id="captureDetailsBody"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/captacao.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(initCaptacaoPage);</script></body></html>
