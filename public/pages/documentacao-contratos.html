<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Documentação | Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div><main class="content-area"><section class="glass-card p-4 reveal"><div class="d-flex justify-content-between align-items-center"><h1 class="h4 mb-0">Gerenciamento de Contratos</h1><button class="btn btn-xp" data-bs-toggle="offcanvas" data-bs-target="#contractPanel">Adicionar Contrato</button></div><hr><div id="contractFeedback" class="alert d-none"></div><div class="table-responsive"><table class="table table-modern"><thead><tr><th>CÓD</th><th>Cliente</th><th>CNPJ/CPF</th><th>Valor do Contrato</th><th>PDF Contrato</th><th>Assinatura</th><th>Ações</th></tr></thead><tbody id="contractsTableBody"></tbody></table></div></section></main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="contractPanel" style="width:540px;"><div class="offcanvas-header"><h5>Novo Contrato</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><form id="contractForm" class="d-grid gap-2"><h6>Dados do Cliente</h6><select id="contractClientId" class="form-select" required></select><input id="contractClientDoc" class="form-control" placeholder="CNPJ/CPF" readonly><input id="contractClientEmail" class="form-control" placeholder="E-mail" readonly><input id="contractClientPhone" class="form-control" placeholder="Telefone" readonly><input id="contractClientValue" class="form-control" placeholder="Valor do Contrato" readonly><hr><h6>Descrição do Contrato</h6><select id="descriptionModel" class="form-select"><option value="">Escolha modelo</option><option value="Prestação de serviços de TI com foco em marketing digital e desenvolvimento web.">Modelo 1 - Serviços TI</option><option value="Contrato de parceria tecnológica para desenvolvimento de sistemas e manutenção.">Modelo 2 - Parceria</option></select><textarea id="descriptionText" class="form-control" rows="3" placeholder="Descrição personalizada"></textarea><h6>Cláusulas Contrato</h6><select id="clauseTheme" class="form-select"><option>Marketing</option><option>Criação de Sites</option><option>Criação de Sistemas</option><option>Parcerias</option><option>Suporte Técnico</option><option>Gestão de Tráfego</option><option>Consultoria TI</option></select><textarea id="clausesText" class="form-control" rows="6">1) A thynkXP Sistemas prestará os serviços conforme escopo acordado.
2) O cliente se compromete com o envio de informações e aprovações em prazo hábil.
3) Pagamentos seguirão cronograma comercial definido neste contrato.</textarea><button class="btn btn-xp mt-2">Salvar Contrato & Gerar PDF</button></form></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/contracts.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(async()=>{await loadClientsForContracts();await loadContracts();});bindContractForm();</script></body></html>
