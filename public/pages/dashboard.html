<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | thynkXP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-grid">
  <div id="sidebarMount"></div>
  <main class="content-area">
    <section class="glass-card p-4 mb-4 reveal">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h1 class="h3 mb-1">Dashboard executivo</h1>
          <p class="text-secondary mb-0">Resumo da operação de clientes, equipe e documentação.</p>
        </div>
        <button class="btn btn-xp"><i class="bi bi-plus-lg me-2"></i>Novo cliente</button>
      </div>
    </section>

    <section class="row g-3 mb-4">
      <div class="col-md-4 reveal"><div class="glass-card kpi-card"><div class="d-flex justify-content-between"><div><div class="text-secondary">Clientes ativos</div><div class="kpi-value" id="clientsCount">0</div></div><div class="kpi-icon"><i class="bi bi-people"></i></div></div></div></div>
      <div class="col-md-4 reveal"><div class="glass-card kpi-card"><div class="d-flex justify-content-between"><div><div class="text-secondary">Administradores</div><div class="kpi-value">1</div></div><div class="kpi-icon"><i class="bi bi-person-gear"></i></div></div></div></div>
      <div class="col-md-4 reveal"><div class="glass-card kpi-card"><div class="d-flex justify-content-between"><div><div class="text-secondary">Contratos pendentes</div><div class="kpi-value">3</div></div><div class="kpi-icon"><i class="bi bi-file-earmark-text"></i></div></div></div></div>
    </section>

    <section class="glass-card p-4 reveal">
      <h2 class="h5 mb-3">Atividade recente</h2>
      <ul class="list-group list-group-flush">
        <li class="list-group-item bg-transparent text-light border-secondary-subtle">Cliente "Atlas Labs" atualizado.</li>
        <li class="list-group-item bg-transparent text-light border-secondary-subtle">Novo contrato aguardando assinatura.</li>
        <li class="list-group-item bg-transparent text-light border-secondary-subtle">Renovação de parceria para revisão.</li>
      </ul>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/clients.js"></script><script src="/js/ui.js"></script>
  <script>protectPage(); mountSidebar().then(loadClients);</script>
</body>
</html>
