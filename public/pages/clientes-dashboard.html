<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clientes | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="/css/app.css"></head>
<body class="bg-grid"><div id="sidebarMount"></div>
<main class="content-area"><section class="glass-card p-4 reveal"><h1 class="h3 mb-2"><i class="bi bi-people me-2"></i>Clientes - Dashboard</h1><p class="text-secondary">Crescimento, cidades com mais clientes e média de contratos.</p>
<div class="row g-3 mb-3"><div class="col-md-4"><div class="glass-card p-3"><small>Total Clientes</small><div class="kpi-value" id="kpiTotalClients">0</div></div></div><div class="col-md-4"><div class="glass-card p-3"><small>Valor médio contrato</small><div class="kpi-value text-success" id="kpiAvgContract">R$ 0,00</div></div></div><div class="col-md-4"><div class="glass-card p-3"><small>Cidade líder</small><div class="kpi-value" id="kpiTopCity">-</div></div></div></div>
<div class="row g-3 mb-3"><div class="col-lg-7"><div class="glass-card p-3"><h6>Crescimento de clientes</h6><canvas id="growthChart" height="120"></canvas></div></div><div class="col-lg-5"><div class="glass-card p-3"><h6>Clientes por cidade</h6><canvas id="cityChart" height="120"></canvas></div></div></div>
<div class="glass-card p-3 mb-3"><h6>Aumento de lucro (contratos por mês)</h6><canvas id="profitChart" height="90"></canvas></div>
<hr><div class="table-responsive"><table class="table table-modern"><thead><tr><th>CÓD</th><th>Nome</th><th>CNPJ/CPF</th><th>E-mail</th><th>Telefone</th><th>Cidade</th><th>Valor Contrato</th></tr></thead><tbody id="clientsTableBody"></tbody></table></div>
</section></main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/auth.js"></script><script src="/js/sidebar.js"></script><script src="/js/clients.js"></script><script src="/js/ui.js"></script><script>protectPage();mountSidebar().then(async()=>{await loadClients();await loadClientDashboardStats();});</script></body></html>
