<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Assinar Contrato</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-grid">
  <div class="container-fluid p-3 signature-layout">
    <div class="row g-3">
      <aside class="col-xl-2 col-lg-3">
        <div class="glass-card p-3 sticky-top" style="top:12px;">
          <h6 class="mb-3"><i class="bi bi-list-ul me-1"></i>Navegação</h6>
          <div id="contractNav" class="list-group list-group-flush small"></div>
          <button id="quickSignButton" class="btn btn-xp w-100 mt-3">Assinar agora</button>
        </div>
      </aside>

      <main class="col-xl-7 col-lg-6">
        <div class="glass-card p-4">
          <h3 id="contractTitle" class="mb-3">Contrato</h3>
          <div id="contractBody" class="signature-contract-body"></div>
        </div>
      </main>

      <aside class="col-xl-3 col-lg-3">
        <div class="glass-card p-3">
          <h6><i class="bi bi-pen me-1"></i>Assinatura Digital</h6>
          <div id="signatureAnimation" class="signature-animation mb-2">thynkXP Sistemas</div>
          <label class="form-label">Nome do responsável</label>
          <input id="signedBy" class="form-control mb-2" placeholder="Nome do responsável">
          <label class="form-label">Comprovante/Prova do Responsável (foto)</label>
          <input id="signerPhoto" class="form-control mb-2" type="file" accept="image/*" capture="user">
          <img id="photoPreview" class="img-fluid rounded border d-none mb-2" alt="Prévia da foto">
          <button id="signButton" class="btn btn-xp w-100">Assinar digitalmente</button>
          <div id="signFeedback" class="alert d-none mt-2"></div>
          <hr>
          <p class="mb-1"><strong>Assinado dia:</strong> <span id="signedAtInfo">-</span></p>
          <p class="mb-1"><strong>Comprovante/Prova do Responsável</strong></p>
          <img id="proofImage" class="img-fluid rounded border d-none" alt="Foto do responsável">
        </div>
      </aside>
    </div>
  </div>
  <script src="/js/sign-contract.js"></script>
</body>
</html>
